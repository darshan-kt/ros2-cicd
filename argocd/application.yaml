apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: ros2-cicd
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/darshan-kt/ros2-cicd.git
    targetRevision: master
    path: helm/ros2-cicd

  destination:
    server: https://kubernetes.default.svc
    namespace: cicd-demo

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
