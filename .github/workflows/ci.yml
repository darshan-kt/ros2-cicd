name: ROS2 Monitoring CI

on:

  push:

    branches:
      - master

  pull_request:

jobs:

  ci:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      ####################################################
      # ROS2
      ####################################################

      - name: ROS2 Humble
        uses: ros-tooling/setup-ros@v0.7

      - name: Build ROS2 Package
        run: |

          docker build -f docker/ros2.Dockerfile -t ros2-build .


      ####################################################
      # Python
      ####################################################

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python Dependencies
        run: |

          pip install -r backend/requirements.txt

          pip install -r backend/requirements-dev.txt

      - name: Ruff
        run: |

          ruff check backend

      - name: Pytest + Coverage
        run: |
          cd backend
          PYTHONPATH=. coverage run -m pytest -v
          coverage report --fail-under=80

      ####################################################
      # Security
      ###################################################

      - name: Bandit
        run: |
          bandit -r backend --exclude backend/tests

      ###################################################
      # Docker
      #################################################

      - name: Login to DockerHub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build ROS2 Image
        run: |

          docker build \
          -f docker/ros2.Dockerfile \
          -t ros2-monitoring:${{ github.sha }} .

      - name: Build Backend Image
        run: |

          docker build \
          -f docker/backend.Dockerfile \
          -t backend:${{ github.sha }} .

      - name: Build Frontend Image
        run: |

          docker build \
          -f docker/frontend.Dockerfile \
          -t frontend:${{ github.sha }} .

      - name: Push ROS2 Image
        if: github.event_name == 'push'

        run: |

          docker tag \
          ros2-monitoring:${{ github.sha }} \
          ${{ secrets.DOCKERHUB_USERNAME }}/ros2-monitoring:${{ github.sha }}

          docker push \
          ${{ secrets.DOCKERHUB_USERNAME }}/ros2-monitoring:${{ github.sha }}

      - name: Push Backend Image
        if: github.event_name == 'push'

        run: |

          docker tag \
          backend:${{ github.sha }} \
          ${{ secrets.DOCKERHUB_USERNAME }}/ros2-backend:${{ github.sha }}

          docker push \
          ${{ secrets.DOCKERHUB_USERNAME }}/ros2-backend:${{ github.sha }}

      - name: Push Frontend Image
        if: github.event_name == 'push'

        run: |

          docker tag \
          frontend:${{ github.sha }} \
          ${{ secrets.DOCKERHUB_USERNAME }}/ros2-frontend:${{ github.sha }}

          docker push \
          ${{ secrets.DOCKERHUB_USERNAME }}/ros2-frontend:${{ github.sha }}

  ###################################################
  # CD - GitOps handoff
  #
  # This job does NOT deploy anything itself. It bumps the image tags in
  # the Helm chart and pushes that change back to git. ArgoCD, running
  # inside the cluster, watches this repo and reconciles the cluster to
  # match on its own. That split (CI never touches the cluster) is what
  # lets this pipeline deploy to a cluster GitHub's cloud runners can't
  # reach, like a local minikube.
  ###################################################

  cd:

    needs: ci

    runs-on: ubuntu-latest

    if: github.event_name == 'push'

    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo curl -fsSL -o /usr/local/bin/yq \
          https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64

          sudo chmod +x /usr/local/bin/yq

      - name: Bump image tags in Helm values
        run: |
          yq -i '.backend.image.tag = "${{ github.sha }}"' helm/ros2-cicd/values.yaml
          yq -i '.frontend.image.tag = "${{ github.sha }}"' helm/ros2-cicd/values.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add helm/ros2-cicd/values.yaml

          git diff --cached --quiet || git commit -m "ci: bump image tags to ${{ github.sha }} [skip ci]"

          git push