apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: cicd-demo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend

        image: darshu916/ros2-frontend:latest

        ports:
        - containerPort: 80