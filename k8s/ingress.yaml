apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: ros2-ingress
  namespace: cicd-demo

spec:
  rules:
  - host: ros2.local

    http:
      paths:
      - path: /
        pathType: Prefix

        backend:
          service:
            name: frontend-service
            port:
              number: 80

  - host: api.ros2.local

    http:
      paths:
      - path: /
        pathType: Prefix

        backend:
          service:
            name: backend-service
            port:
              number: 8000