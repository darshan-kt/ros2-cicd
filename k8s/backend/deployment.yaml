apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: cicd-demo

spec:

  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:

    metadata:
      labels:
        app: backend

    spec:

      containers:

      - name: backend

        image: darshu916/fastapi-cicd:latest

        imagePullPolicy: Always

        ports:

        - containerPort: 8000

        envFrom:
         - configMapRef:
            name: backend-config

         - secretRef:
            name: backend-secret

        readinessProbe:

          httpGet:
            path: /ready
            port: 8000

          initialDelaySeconds: 5
          periodSeconds: 5

        livenessProbe:

          httpGet:
            path: /health
            port: 8000

          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3

        startupProbe:

          httpGet:
            path: /health
            port: 8000

          failureThreshold: 30
          periodSeconds: 2
