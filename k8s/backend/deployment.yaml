apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: cicd-demo

spec:

  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:

    metadata:
      labels:
        app: backend

    spec:

      containers:

      - name: backend

        image: darshu916/fastapi-cicd:latest

        imagePullPolicy: Always

        ports:

        - containerPort: 8000

        envFrom:
         - configMapRef:
            name: backend-config

         - secretRef:
           name: backend-secret